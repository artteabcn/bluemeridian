name = "bluemeridian"
compatibility_date = "2026-06-26"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "bluemeridian_db"
database_id = "REPLACE_WITH_NEW_D1_DATABASE_ID"

[[r2_buckets]]
binding = "FILES"
bucket_name = "bluemeridian"
